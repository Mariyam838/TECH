<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — TechMart</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cart-page { background: var(--bg); min-height: 100vh; padding-bottom: 80px; }

    /* ── PAGE HEADER ── */
    .cart-header {
      background: var(--navy);
      padding: 56px 0 44px;
      margin-bottom: 0;
    }
    .cart-header-inner {
      max-width: 1300px; margin: 0 auto; padding: 0 40px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .cart-header h1 {
      font-family: var(--font-display); font-size: 52px; font-weight: 700;
      color: #fff; letter-spacing: -.5px; line-height: 1;
    }
    .cart-header h1 span { color: var(--red); }
    .cart-header-meta { text-align: right; }
    .cart-header-count { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
    .cart-header-user {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.75); padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    }

    /* ── STEPS BAR ── */
    .steps-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0; display: flex; align-items: stretch;
    }
    .steps-bar-inner {
      max-width: 1300px; margin: 0 auto; padding: 0 40px;
      display: flex; align-items: center; gap: 0; width: 100%;
    }
    .step {
      display: flex; align-items: center; gap: 12px;
      padding: 20px 32px 20px 0;
      font-size: 14px; font-weight: 600; color: var(--muted);
      position: relative;
    }
    .step:not(:last-child)::after {
      content: '›'; position: absolute; right: 10px;
      color: var(--border-bright); font-size: 18px;
    }
    .step.active { color: var(--navy); }
    .step.done { color: #16a34a; }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
      background: var(--bg); border: 2px solid var(--border);
      color: var(--muted);
    }
    .step.active .step-num { background: var(--red); border-color: var(--red); color: #fff; }
    .step.done .step-num { background: #16a34a; border-color: #16a34a; color: #fff; }

    /* ── LAYOUT ── */
    .cart-body {
      max-width: 1300px; margin: 40px auto; padding: 0 40px;
    }
    .cart-grid {
      display: grid; grid-template-columns: 1fr 380px; gap: 28px; align-items: start;
    }

    /* ── CART ITEMS PANEL ── */
    .cart-panel {
      background: var(--surface); border-radius: 20px;
      border: 1px solid var(--border); overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .cart-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 28px; border-bottom: 1px solid var(--border);
    }
    .cart-panel-title {
      font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--navy);
      display: flex; align-items: center; gap: 10px;
    }
    .cart-panel-title .badge {
      background: var(--red); color: #fff; font-size: 11px; font-weight: 800;
      padding: 3px 9px; border-radius: 20px; font-family: var(--font);
    }
    .clear-cart-btn {
      font-size: 13px; font-weight: 600; color: var(--muted);
      background: none; border: none; cursor: pointer; transition: color .2s;
      display: flex; align-items: center; gap: 5px;
    }
    .clear-cart-btn:hover { color: var(--red); }

    /* ── CART ITEM ROW ── */
    .cart-item-row {
      display: grid;
      grid-template-columns: 96px 1fr auto;
      gap: 0;
      padding: 22px 28px;
      border-bottom: 1px solid var(--border);
      transition: background .2s;
      align-items: center;
    }
    .cart-item-row:last-child { border-bottom: none; }
    .cart-item-row:hover { background: rgba(0,0,0,0.015); }

    .cart-item-img-wrap {
      width: 88px; height: 88px;
      background: var(--bg); border-radius: 14px; border: 1px solid var(--border);
      overflow: hidden; flex-shrink: 0; cursor: pointer;
      transition: box-shadow .2s;
    }
    .cart-item-img-wrap:hover { box-shadow: var(--shadow-md); }
    .cart-item-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .cart-item-details { padding: 0 20px; }
    .cart-item-cat-tag {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--red); margin-bottom: 5px;
    }
    .cart-item-name {
      font-weight: 700; font-size: 16px; color: var(--navy);
      cursor: pointer; transition: color .2s; margin-bottom: 6px; line-height: 1.3;
    }
    .cart-item-name:hover { color: var(--red); }
    .cart-item-unit-price {
      font-size: 13px; color: var(--muted); font-weight: 400;
    }
    .cart-item-unit-price strong { color: var(--text-secondary); font-weight: 600; }

    .cart-item-controls {
      display: flex; flex-direction: column; align-items: flex-end; gap: 14px; flex-shrink: 0;
    }
    .cart-item-total {
      font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--navy);
    }

    .qty-stepper {
      display: inline-flex; align-items: center;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .qty-step-btn {
      width: 36px; height: 36px; border: none; background: none;
      font-size: 18px; font-weight: 700; cursor: pointer; color: var(--navy);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .qty-step-btn:hover { background: var(--red); color: #fff; }
    .qty-step-val {
      width: 36px; text-align: center; font-size: 15px;
      font-weight: 700; color: var(--navy); border: none;
      background: none; padding: 0;
    }

    .remove-item-btn {
      font-size: 12px; font-weight: 700; color: var(--muted);
      background: none; border: none; cursor: pointer;
      text-transform: uppercase; letter-spacing: .5px;
      display: flex; align-items: center; gap: 5px; transition: color .2s;
    }
    .remove-item-btn:hover { color: var(--red); }

    /* ── FREE DELIVERY BAR ── */
    .delivery-bar {
      margin: 0; padding: 16px 28px;
      background: linear-gradient(90deg, rgba(22,163,74,0.06), rgba(22,163,74,0.02));
      border-bottom: 1px solid rgba(22,163,74,0.12);
      display: flex; align-items: center; gap: 12px;
    }
    .delivery-bar .icon { font-size: 20px; }
    .delivery-bar .text { font-size: 13px; font-weight: 600; color: #166534; flex: 1; }
    .delivery-bar .progress-wrap { flex: 1; max-width: 160px; }
    .delivery-bar .progress-track { height: 6px; background: rgba(22,163,74,0.15); border-radius: 3px; overflow: hidden; }
    .delivery-bar .progress-fill { height: 100%; background: #16a34a; border-radius: 3px; transition: width .4s ease; }

    /* ── PROMO CODE ── */
    .promo-row {
      padding: 16px 28px; border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }
    .promo-input {
      flex: 1; padding: 10px 14px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; font-family: var(--font); font-size: 14px;
      color: var(--text); outline: none; transition: border-color .2s;
    }
    .promo-input::placeholder { color: var(--muted); }
    .promo-input:focus { border-color: var(--red); }
    .promo-apply-btn {
      padding: 10px 20px; background: var(--navy); color: #fff;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background .2s; white-space: nowrap;
    }
    .promo-apply-btn:hover { background: var(--red); }

    /* ── ORDER SUMMARY ── */
    .summary-panel {
      background: var(--surface); border-radius: 20px;
      border: 1px solid var(--border); overflow: hidden;
      box-shadow: var(--shadow-sm); position: sticky; top: 88px;
    }
    .summary-header {
      padding: 22px 28px; border-bottom: 1px solid var(--border);
    }
    .summary-title {
      font-family: var(--font-display); font-size: 22px;
      font-weight: 700; color: var(--navy);
    }
    .summary-body { padding: 24px 28px; }

    .sum-row {
      display: flex; justify-content: space-between;
      margin-bottom: 14px; font-size: 14px;
    }
    .sum-row .lbl { color: var(--text-secondary); font-weight: 400; }
    .sum-row .val { font-weight: 600; color: var(--navy); }
    .sum-row .val.free { color: #16a34a; font-weight: 700; }
    .sum-row.total-row {
      padding-top: 16px; margin-top: 8px;
      border-top: 2px solid var(--border);
      font-size: 18px; font-weight: 700;
    }
    .sum-row.total-row .lbl { color: var(--navy); }
    .sum-row.total-row .val { color: var(--red); font-size: 22px; font-family: var(--font-display); }

    .checkout-btn {
      width: 100%; padding: 16px; margin-top: 20px;
      background: var(--red); color: #fff; border: none;
      border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      text-transform: uppercase; letter-spacing: .5px;
      box-shadow: 0 4px 20px rgba(232,23,43,0.3);
    }
    .checkout-btn:hover { background: #ff2d40; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,23,43,0.4); }
    .checkout-btn:active { transform: scale(.98); }

    .continue-link {
      display: block; text-align: center; margin-top: 14px;
      font-size: 13px; color: var(--muted); font-weight: 500;
      transition: color .2s;
    }
    .continue-link:hover { color: var(--navy); }

    .trust-badges {
      margin-top: 20px; padding-top: 20px;
      border-top: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; text-align: center;
    }
    .trust-badge {
      padding: 10px 6px; background: var(--bg); border-radius: 10px;
      border: 1px solid var(--border);
    }
    .trust-badge .tb-icon { font-size: 20px; margin-bottom: 4px; }
    .trust-badge .tb-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }

    /* ── RECOMMENDATIONS ── */
    .reco-section {
      max-width: 1300px; margin: 40px auto; padding: 0 40px;
    }
    .reco-header { margin-bottom: 20px; }
    .reco-title {
      font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--navy);
    }
    .reco-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    }

    /* ── EMPTY CART ── */
    .empty-cart {
      text-align: center; padding: 100px 40px;
      background: var(--surface); border-radius: 20px;
      border: 1px solid var(--border);
    }
    .empty-cart-emoji { font-size: 80px; margin-bottom: 24px; display: block;
      animation: emptyBounce 2s ease-in-out infinite;
    }
    @keyframes emptyBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .empty-cart h2 { font-family: var(--font-display); font-size: 38px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
    .empty-cart p { font-size: 16px; color: var(--muted); font-weight: 300; margin-bottom: 32px; }

    @media (max-width: 1000px) {
      .cart-grid { grid-template-columns: 1fr; }
      .summary-panel { position: static; }
      .reco-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .cart-body { padding: 0 16px; margin-top: 24px; }
      .cart-header-inner { padding: 0 20px; flex-direction: column; align-items: flex-start; gap: 12px; }
      .steps-bar-inner { padding: 0 20px; }
      .cart-header h1 { font-size: 38px; }
      .cart-item-row { grid-template-columns: 72px 1fr; gap: 0; }
      .cart-item-controls { grid-column: 1 / -1; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 0 6px 0; }
      .reco-grid { grid-template-columns: repeat(2, 1fr); }
      .reco-section { padding: 0 16px; }
    }
  </style>
</head>
<body class="cart-page">
  <div id="nav-wrap"></div>

  <!-- PAGE HEADER -->
  <div class="cart-header">
    <div class="cart-header-inner">
      <div>
        <div style="font-size:12px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">
          <a href="index.html" style="color:rgba(255,255,255,0.45)">Home</a>
          <span style="margin:0 8px;opacity:.4">›</span>
          Shopping Cart
        </div>
        <h1>Shopping <span>Cart</span></h1>
      </div>
      <div class="cart-header-meta">
        <div class="cart-header-count" id="header-count">0 items</div>
        <div class="cart-header-user" id="header-user">👤 Guest</div>
      </div>
    </div>
  </div>

  <!-- STEPS -->
  <div class="steps-bar">
    <div class="steps-bar-inner">
      <div class="step active">
        <div class="step-num">1</div>
        Cart
      </div>
      <div class="step">
        <div class="step-num">2</div>
        Checkout
      </div>
      <div class="step">
        <div class="step-num">3</div>
        Confirmation
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div class="cart-body">
    <div id="cart-root"></div>
  </div>

  <!-- RECOMMENDATIONS -->
  <div class="reco-section" id="reco-section" style="display:none">
    <div class="reco-header">
      <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:20px;height:2px;background:var(--red);border-radius:1px"></span>You Might Like</div>
      <div class="reco-title">Complete Your Setup</div>
    </div>
    <div class="reco-grid" id="reco-grid"></div>
  </div>

  <div id="foot-wrap"></div>

  <script src="data.js"></script>
  <script>
    document.getElementById('nav-wrap').innerHTML = renderNav('cart');
    document.getElementById('foot-wrap').innerHTML = renderFooter();

    // User display
    const user = getUser();
    if (user) {
      document.getElementById('header-user').innerHTML = `👤 ${user.firstName || user.username}`;
    } else {
      document.getElementById('header-user').innerHTML = `👤 Guest`;
    }

    function render() {
      const cart = getCart();
      const count = cartCount();
      const root = document.getElementById('cart-root');
      document.getElementById('header-count').textContent = count === 0 ? 'Empty' : `${count} item${count !== 1 ? 's' : ''}`;

      if (cart.length === 0) {
        root.innerHTML = `
          <div class="empty-cart">
            <span class="empty-cart-emoji">🛒</span>
            <h2>Your cart is empty</h2>
            <p>Looks like you haven't added anything yet.<br>Explore our collection and find something you'll love.</p>
            <a href="products.html?cat=all" class="btn-primary" style="display:inline-flex;font-size:15px;padding:14px 32px">Browse Products →</a>
          </div>`;
        document.getElementById('reco-section').style.display = 'none';
        return;
      }

      const sub = cartTotal();
      const delivery = sub >= 200 ? 0 : 25;
      const vat = Math.round(sub * 0.05);
      const total = sub + delivery + vat;
      const freeAt = 200;
      const progress = Math.min(100, Math.round((sub / freeAt) * 100));
      const remaining = freeAt - sub;

      // Delivery bar HTML
      const deliveryBarHTML = delivery === 0
        ? `<div class="delivery-bar"><div class="icon">🎉</div><div class="text">You qualify for <strong>FREE delivery!</strong></div><div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:100%"></div></div></div></div>`
        : `<div class="delivery-bar"><div class="icon">🚚</div><div class="text">Add <strong>AED ${remaining}</strong> more for free delivery</div><div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div></div></div>`;

      // Items HTML
      const itemsHTML = cart.map(item => {
        const p = products.find(x => x.id === item.id);
        if (!p) return '';
        return `
        <div class="cart-item-row">
          <div class="cart-item-img-wrap" onclick="location.href='product.html?id=${p.id}'">
            <img src="${p.image}" alt="${p.name}">
          </div>
          <div class="cart-item-details">
            <div class="cart-item-cat-tag">${p.category}</div>
            <div class="cart-item-name" onclick="location.href='product.html?id=${p.id}'">${p.name}</div>
            <div class="cart-item-unit-price">Unit price: <strong>AED ${p.price.toLocaleString()}</strong></div>
          </div>
          <div class="cart-item-controls">
            <div class="cart-item-total">AED ${(p.price * item.qty).toLocaleString()}</div>
            <div class="qty-stepper">
              <button class="qty-step-btn" onclick="upd(${p.id}, ${item.qty - 1})">−</button>
              <span class="qty-step-val">${item.qty}</span>
              <button class="qty-step-btn" onclick="upd(${p.id}, ${item.qty + 1})">+</button>
            </div>
            <button class="remove-item-btn" onclick="rm(${p.id})">✕ Remove</button>
          </div>
        </div>`;
      }).join('');

      root.innerHTML = `
      <div class="cart-grid">
        <div>
          ${deliveryBarHTML}
          <div class="cart-panel">
            <div class="cart-panel-header">
              <div class="cart-panel-title">
                Your Items
                <span class="badge">${count}</span>
              </div>
              <button class="clear-cart-btn" onclick="clearAll()">🗑 Clear All</button>
            </div>
            ${itemsHTML}
            <div class="promo-row">
              <input class="promo-input" id="promo-code" placeholder="🏷 Enter promo code">
              <button class="promo-apply-btn" onclick="applyPromo()">Apply</button>
            </div>
          </div>
        </div>

        <div>
          <div class="summary-panel">
            <div class="summary-header">
              <div class="summary-title">Order Summary</div>
            </div>
            <div class="summary-body">
              <div class="sum-row">
                <span class="lbl">Subtotal (${count} items)</span>
                <span class="val">AED ${sub.toLocaleString()}</span>
              </div>
              <div class="sum-row">
                <span class="lbl">Delivery</span>
                <span class="val ${delivery === 0 ? 'free' : ''}">${delivery === 0 ? '🚀 FREE' : 'AED ' + delivery}</span>
              </div>
              <div class="sum-row">
                <span class="lbl">VAT (5%)</span>
                <span class="val">AED ${vat.toLocaleString()}</span>
              </div>
              <div class="sum-row total-row">
                <span class="lbl">Total</span>
                <span class="val">AED ${total.toLocaleString()}</span>
              </div>

              <button class="checkout-btn" onclick="location.href='checkout.html'">
                Proceed to Checkout →
              </button>
              <a href="products.html?cat=all" class="continue-link">← Continue Shopping</a>

              <div class="trust-badges">
                <div class="trust-badge">
                  <div class="tb-icon">🔒</div>
                  <div class="tb-label">Secure Pay</div>
                </div>
                <div class="trust-badge">
                  <div class="tb-icon">✅</div>
                  <div class="tb-label">Genuine</div>
                </div>
                <div class="trust-badge">
                  <div class="tb-icon">🔄</div>
                  <div class="tb-label">30-Day Return</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>`;

      // Recommendations
      const cartIds = cart.map(i => i.id);
      const recoCats = [...new Set(cart.map(i => { const p = products.find(x => x.id === i.id); return p?.category; }))];
      const recos = products.filter(p => !cartIds.includes(p.id) && recoCats.includes(p.category)).slice(0, 4);
      if (recos.length >= 2) {
        document.getElementById('reco-section').style.display = 'block';
        document.getElementById('reco-grid').innerHTML = recos.map(p => productCard(p)).join('');
      }
    }

    function upd(id, qty) {
      let cart = getCart();
      if (qty <= 0) { cart = cart.filter(x => x.id !== id); toast('Item removed from cart'); }
      else { const i = cart.findIndex(x => x.id === id); if (i > -1) cart[i].qty = Math.min(10, qty); }
      saveCart(cart); render();
    }

    function rm(id) {
      saveCart(getCart().filter(x => x.id !== id));
      toast('Item removed from cart');
      render();
    }

    function clearAll() {
      if (!confirm('Remove all items from your cart?')) return;
      saveCart([]); toast('Cart cleared'); render();
    }

    function applyPromo() {
      const code = document.getElementById('promo-code')?.value.trim().toUpperCase();
      if (!code) return;
      toast(code === 'TECHMART10' ? '🎉 10% discount applied!' : '❌ Invalid promo code');
    }

    render();
  </script>
</body>
</html>
