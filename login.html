<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TechMart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top:0">
  <div id="nav-wrap"></div>

  <div class="auth-wrap" style="min-height:100vh">
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=1200&q=80" alt="Tech">
      <div class="auth-visual-overlay">
        <div class="auth-visual-text">
          <h2>Welcome<br>Back.</h2>
          <p>Your tech journey continues<br>right here in Dubai.</p>
        </div>
      </div>
    </div>
    <div class="auth-form-side">
      <div class="auth-form-box">
        <a href="index.html" class="auth-logo-sm">TECH<em>MART</em></a>
        <div class="auth-title">Sign In 👋</div>
        <p class="auth-sub">Enter your credentials to access your account</p>

        <div id="global-err" style="background:rgba(255,26,46,0.1);border:1px solid rgba(255,26,46,.3);color:#ff8090;padding:12px 16px;border-radius:8px;font-size:14px;font-weight:600;margin-bottom:20px;display:none"></div>

        <div class="form-group" id="fg-u">
          <label>Username</label>
          <input id="uname" placeholder="your_username" onkeydown="if(event.key==='Enter')doLogin()">
          <div class="form-error">Required</div>
        </div>

        <div class="form-group" id="fg-p">
          <label>Password</label>
          <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
          <div class="form-error">Required</div>
        </div>

        <button class="btn-primary" style="width:100%;justify-content:center;font-size:16px;padding:15px;margin-top:8px" onclick="doLogin()">Sign In →</button>

        <div class="auth-switch">Don't have an account? <a href="signup.html">Create one →</a></div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    document.getElementById('nav-wrap').innerHTML = renderNav();
    if (getUser()) window.location.href = 'profile.html';

    function doLogin() {
      const u = document.getElementById('uname').value.trim();
      const p = document.getElementById('pw').value;
      let ok = true;
      const fg1 = document.getElementById('fg-u'), fg2 = document.getElementById('fg-p');
      if (!u) { fg1.classList.add('has-error'); ok=false; } else fg1.classList.remove('has-error');
      if (!p) { fg2.classList.add('has-error'); ok=false; } else fg2.classList.remove('has-error');
      if (!ok) return;

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user = users.find(x => x.username === u && x.password === p);

      if (!user) {
        const ge = document.getElementById('global-err');
        ge.style.display = 'block';
        ge.textContent = '❌ Invalid username or password. Try signing up first.';
        return;
      }

      localStorage.setItem('currentUser', JSON.stringify(user));
      toast('Welcome back, ' + user.username + '!');
      setTimeout(() => window.location.href = new URLSearchParams(window.location.search).get('redirect') || 'index.html', 800);
    }
  </script>
</body>
</html>
